name: mission-control
services:
  app:
    image: ghcr.io/vinayakv22/mission-control:latest
    restart: unless-stopped
    environment:
      PORT: '3000'
      NODE_ENV: production
      AUTH_USER: admin
      AUTH_PASS: changeme
      API_KEY: changeme
    x-casaos:
      envs:
        - container: PORT
          description:
            en_us: Port for Mission Control web interface
        - container: AUTH_USER
          description:
            en_us: Initial admin username
        - container: AUTH_PASS
          description:
            en_us: Initial admin password (change this!)
        - container: API_KEY
          description:
            en_us: API key for headless access
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/data
        target: /app/.data
x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: app
  description:
    en_us: Mission Control is the open-source dashboard for AI agent orchestration. Manage agent fleets, track tasks, monitor costs, and orchestrate workflows — all from a single pane of glass. Features real-time monitoring, task board, cost tracking, role-based access control, and multi-gateway support.
  tagline:
    en_us: Open-source Dashboard For AI Agent Orchestration With Real-time Monitoring, Task Management, And Cost Tracking
  developer: Builderz Labs
  author: vinayakv22
  icon: https://raw.githubusercontent.com/builderz-labs/mission-control/main/public/favicon.svg
  thumbnail: https://raw.githubusercontent.com/builderz-labs/mission-control/main/docs/mission-control.jpg
  title:
    en_us: Mission Control
  category: Utilities
  port_map: '3000'
